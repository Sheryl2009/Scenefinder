name: Mobile CI

on:
  push:
    paths:
      - 'packages/mobile/**'
  pull_request:
    paths:
      - 'packages/mobile/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/mobile/package-lock.json
      - name: Install dependencies
        run: |
          cd packages/mobile
          npm install
      - name: Lint
        run: |
          cd packages/mobile
          npm run lint || true
      - name: Type check
        run: |
          cd packages/mobile
          npx tsc --noEmit || true
